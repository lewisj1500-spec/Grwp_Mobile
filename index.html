const CalendarView = ({back, openCommunityDetail, onMem, onMeet, onCommMeet}) => {
  const [selKey,setSelKey]=React.useState(null);
  const [popup,setPopup]=React.useState(null);

  const VENUE_META = {
    'Nightjar':{img:'assets/venue-nightjar.jpg',area:'Old Street',cat:'Cocktail Bar',price:'£18–30pp',bc:T.blue},
    'Flat Iron Square':{img:'assets/venue-flat-iron-square.jpg',area:'Borough',cat:'Street Food',price:'£8–15pp',bc:T.green},
    'Flight Club Darts':{img:'assets/venue-flight-club.jpg',area:'Shoreditch',cat:'Games',price:'£12–18pp',bc:T.gold},
    'South London Run Club 5k':{img:'assets/community-run-club.jpg',area:'Clapham Common',cat:'Running',price:'Free',bc:T.teal},
  };

  const FUTURE=[
    {day:26,m:4,y:2026,label:'Nightjar',time:'19:00',group:'Flatmates',gc:'#7C3AED',isComm:false,isPast:false},
    {day:27,m:4,y:2026,label:'Flat Iron Square',time:'14:00',group:'Uni Friends',gc:T.blue,isComm:false,isPast:false},
    {day:2, m:5,y:2026,label:'Flight Club Darts',time:'18:30',group:'Work Crew',gc:'#10B981',isComm:false,isPast:false},
    {day:3, m:5,y:2026,label:'South London Run Club 5k',time:'08:30',group:'South London Run Club',gc:'#0D9488',isComm:true,communityId:'SLR',isPast:false},
  ];
  const PAST=[
    {day:21,m:4,y:2026,label:'Flight Club Darts',time:'18:30',group:'Work Crew',gc:'#10B981',isPast:true,memId:3},
    {day:14,m:4,y:2026,label:'Flat Iron Square',time:'14:00',group:'Uni Friends',gc:T.blue,isPast:true,memId:2},
    {day:10,m:4,y:2026,label:'Nightjar',time:'19:00',group:'Flatmates',gc:'#7C3AED',isPast:true,memId:1},
    {day:22,m:3,y:2026,label:'Flight Club Darts',time:'19:00',group:'Work Crew',gc:'#10B981',isPast:true,memId:3},
    {day:8, m:3,y:2026,label:'Flat Iron Square',time:'13:00',group:'Flatmates',gc:'#7C3AED',isPast:true,memId:1},
  ];
  const ALL=[...FUTURE,...PAST];
  const eventsOn=(d,m,y)=>ALL.filter(e=>e.day===d&&e.m===m&&e.y===y);

  const TODAY={d:21,m:4,y:2026};
  const isPastDay=(d,m,y)=>y<TODAY.y||(y===TODAY.y&&m<TODAY.m)||(y===TODAY.y&&m===TODAY.m&&d<TODAY.d);

  const MONTHS=[
    {name:'March 2026',   m:3,y:2026,days:31,offset:6},
    {name:'April 2026',   m:4,y:2026,days:30,offset:2},
    {name:'May 2026',     m:5,y:2026,days:31,offset:4},
  ];

  const handleTap=(d,m,y)=>{
    const key=`${d}-${m}-${y}`;
    const evs=eventsOn(d,m,y);
    if(!evs.length)return;
    if(selKey===key){setSelKey(null);setPopup(null);return;}
    setSelKey(key);
    setPopup({d,m,y,evs});
  };

  const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  /* ── Inline popup card — drops down with venue image + tappable meet card ── */
  const PopupCard = ({pop}) => {
    const accent = pop.evs[0].gc;
    const dateLabel = `${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(pop.y,pop.m-1,pop.d).getDay()]} ${pop.d} ${MONTH_NAMES[pop.m-1]}`;
    const handleMeetTap = (ev) => {
      if (ev.isPast) { setSelKey(null); setPopup(null); onMem && onMem(ev.memId); return; }
      if (ev.isComm) { setSelKey(null); setPopup(null); if(onCommMeet){onCommMeet(ev.meetId||'cm1');return;} openCommunityDetail && openCommunityDetail(ev.communityId); return; }
      const vm = VENUE_META[ev.label] || {};
      const meet = {
        venue: ev.label, img: vm.img, bc: vm.bc || ev.gc,
        badge: vm.cat || 'Meet', area: vm.area || '', dist: '',
        countdown: dateLabel, date: dateLabel, time: ev.time,
        group: ev.group, price: vm.price || '',
        pp: [], extra: 0,
      };
      setSelKey(null); setPopup(null);
      onMeet && onMeet(meet);
    };
    return (
      <div style={{margin:'6px 2px 14px',background:T.white,borderRadius:18,
        overflow:'hidden',border:`1px solid ${accent}33`,
        boxShadow:`0 8px 28px ${accent}22, 0 2px 6px rgba(15,23,42,0.05)`,
        animation:'modeDrop .25s ease-out'}}>
        {/* Date header */}
        <div style={{padding:'10px 14px 8px',display:'flex',alignItems:'center',
          justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:8,height:8,borderRadius:4,background:accent}}/>
            <span style={{fontSize:12,fontWeight:800,color:T.ink}}>{dateLabel}</span>
          </div>
          <button onClick={()=>{setSelKey(null);setPopup(null);}}
            style={{background:'none',border:'none',cursor:'pointer',
              color:T.meta,fontSize:18,lineHeight:1,padding:'2px 4px',fontWeight:300}}>
            ×
          </button>
        </div>
        {/* Each event renders as a tappable card */}
        {pop.evs.map((ev,i)=>{
          const vm = VENUE_META[ev.label] || {};
          const isPast = ev.isPast;
          return (
            <div key={i} onClick={()=>handleMeetTap(ev)}
              style={{margin:'0 10px 10px',borderRadius:14,overflow:'hidden',
                background:T.white,border:`1px solid ${T.borderSoft}`,cursor:'pointer',
                boxShadow:'0 1px 4px rgba(15,23,42,0.05)',transition:'transform .15s'}}>
              {/* Venue image hero */}
              <div style={{position:'relative',height:108,overflow:'hidden',
                background:isPast?T.alt:`linear-gradient(135deg,${ev.gc}33,${ev.gc}66)`}}>
                {vm.img && (
                  <img src={vm.img} style={{width:'100%',height:'100%',objectFit:'cover',
                    display:'block',filter:isPast?'grayscale(0.4)':'none',opacity:isPast?0.6:1}}
                    onError={e=>{e.target.style.display='none';}}/>
                )}
                <div style={{position:'absolute',inset:0,
                  background:'linear-gradient(to top,rgba(15,23,42,0.55) 0%,transparent 55%)'}}/>
                {/* Group/community pill */}
                <div style={{position:'absolute',top:10,left:10,
                  display:'flex',alignItems:'center',gap:5,
                  background:'rgba(255,255,255,0.22)',backdropFilter:'blur(10px)',
                  WebkitBackdropFilter:'blur(10px)',
                  borderRadius:50,padding:'3px 9px 3px 4px'}}>
                  <div style={{width:16,height:16,borderRadius:5,background:ev.gc,
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:8,fontWeight:800,color:'white'}}>
                      {ev.group.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase()}
                    </span>
                  </div>
                  <span style={{fontSize:10,fontWeight:700,color:'white'}}>{ev.group}</span>
                </div>
                {ev.isComm && (
                  <div style={{position:'absolute',top:10,right:10,
                    background:T.teal,color:'white',borderRadius:50,
                    padding:'2px 8px',fontSize:9,fontWeight:800,letterSpacing:'.04em'}}>
                    COMMUNITY
                  </div>
                )}
                {isPast && (
                  <div style={{position:'absolute',top:10,right:10,
                    background:T.gold,color:'white',borderRadius:50,
                    padding:'2px 8px',fontSize:9,fontWeight:800,letterSpacing:'.04em'}}>
                    MEMORY
                  </div>
                )}
                {/* Bottom-left venue title */}
                <div style={{position:'absolute',bottom:8,left:10,right:10}}>
                  <div style={{fontSize:15,fontWeight:900,color:'white',letterSpacing:'-0.2px',lineHeight:1.15}}>{ev.label}</div>
                  {vm.area && <div style={{fontSize:10,color:'rgba(255,255,255,0.85)',marginTop:1}}>{vm.area}</div>}
                </div>
              </div>
              {/* Footer row — meta + arrow */}
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.ink}}>
                    {ev.time}{vm.cat?` · ${vm.cat}`:''}
                  </div>
                  {vm.price && <div style={{fontSize:10,color:T.meta,marginTop:1}}>{vm.price}</div>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:5,
                  color:isPast?T.gold:accent,fontSize:11,fontWeight:700,flexShrink:0}}>
                  <span>{isPast?'View memory':ev.isComm?'View community':'View meet'}</span>
                  <svg width="9" height="14" viewBox="0 0 8 14" fill="none">
                    <path d="M1.5 1.5L6 6L1.5 10.5" stroke={isPast?T.gold:accent} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  /* ── Day cell ── */
  const DayCell = ({d,m,y}) => {
    const evs=eventsOn(d,m,y);
    const past=isPastDay(d,m,y);
    const isToday=d===TODAY.d&&m===TODAY.m&&y===TODAY.y;
    const key=`${d}-${m}-${y}`;
    const isSel=selKey===key;
    const col=evs.length&&!past?evs[0].gc:null;
    return (
      <div onClick={()=>handleTap(d,m,y)} style={{
        display:'flex',flexDirection:'column',alignItems:'center',
        gap:3,padding:'3px 0',
        cursor:evs.length?'pointer':'default',
        opacity:past&&!evs.length?0.22:1,
      }}>
        <div style={{
          width:30,height:30,borderRadius:15,
          background:isSel?T.ink:isToday?T.blue:col?`${col}20`:'transparent',
          border:isSel||isToday?'none':col?`1.5px solid ${col}`:'none',
          display:'flex',alignItems:'center',justifyContent:'center',
          transition:'all .15s',
          boxShadow:col&&!isSel&&!isToday?`0 2px 8px ${col}50`:'none',
        }}>
          <span style={{
            fontSize:12,fontWeight:isSel||isToday?800:evs.length?700:400,
            color:isSel||isToday?'white':col?col:past?T.meta:T.ink,
          }}>{d}</span>
        </div>
        <div style={{display:'flex',gap:2,height:5,alignItems:'center',justifyContent:'center'}}>
          {evs.slice(0,3).map((ev,i)=>(
            <div key={i} style={{
              width:ev.isPast?4:5,height:ev.isPast?4:5,borderRadius:3,
              background:ev.isPast?T.border:ev.gc,
            }}/>
          ))}
        </div>
      </div>
    );
  };

  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',background:T.bg}}>
      <DI/>
      <div style={{padding:'50px 16px 12px',flexShrink:0,background:T.white,borderBottom:`1px solid ${T.border}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <BackBtn onPress={back}/>
          <div style={{flex:1}}>
            <div style={{fontSize:22,fontWeight:900,color:T.ink,letterSpacing:'-0.5px'}}>Calendar</div>
          </div>
        </div>
      </div>

      <div className="sh" style={{flex:1,overflowY:'auto',padding:'0 16px 80px'}}>
        {MONTHS.map(({name,m,y,days,offset})=>(
          <div key={name} style={{marginBottom:28}}>
            <div style={{fontSize:15,fontWeight:800,color:T.ink,marginBottom:10}}>{name}</div>
            {/* Day headers */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:6}}>
              {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>(
                <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:T.meta}}>{d}</div>
              ))}
            </div>
            {/* Day cells — built row by row so popup injects below the right row */}
            {(()=>{
              const allCells=[];
              for(let i=0;i<offset;i++) allCells.push(null);
              for(let d=1;d<=days;d++) allCells.push(d);
              const rows=[];
              for(let r=0;r<Math.ceil(allCells.length/7);r++){
                const rowDays=allCells.slice(r*7,(r+1)*7);
                const selInRow=popup&&popup.m===m&&popup.y===y&&rowDays.includes(popup.d);
                rows.push(
                  <React.Fragment key={r}>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:2}}>
                      {rowDays.map((d,ci)=>
                        d===null
                          ? <div key={`e${ci}`}/>
                          : <DayCell key={d} d={d} m={m} y={y}/>
                      )}
                    </div>
                    {selInRow&&popup&&<PopupCard pop={popup}/>}
                  </React.Fragment>
                );
              }
              return rows;
            })()}
          </div>
        ))}
      </div>
    </div>
  );
};

  const [profile,setProfile]=React.useState({});
  const merge=data=>setProfile(p=>({...p,...data}));
  const next=data=>{merge(data||{});setStep(s=>s+1);};

  const screens=[
    <OBQ2   key={0} onNext={next} onBack={back}/>,
    <OBDone key={1} profile={profile} onDone={onComplete}/>,
  ];
  return screens[step]||screens[0];
};

function App() {

  const [invGroup,setInvGroup]=React.useState('Flatmates');
  const [curEvent,setCurEvent]=React.useState(null);
  const [previewCommunity,setPreviewCommunity]=React.useState(null);
  const [curMeet,setCurMeet]=React.useState(null);
  const [curMemId,setCurMemId]=React.useState(null);
  const [curMember,setCurMember]=React.useState(null);
  const [analyticsGroupId,setAnalyticsGroupId]=React.useState(null);

  const [curCommunityId,setCurCommunityId]=React.useState('SLR');
  const [curCommunityMeetId,setCurCommunityMeetId]=React.useState(null);
  const [curCommMemId,setCurCommMemId]=React.useState(null);
  const [editGroupId,setEditGroupId]=React.useState('FM');
  const [commRsvps,setCommRsvps]=React.useState(new Set(['SLR']));
  const toggleCommRsvp=id=>setCommRsvps(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);return next;});
  const [userPro,setUserPro]=React.useState(()=>localStorage.getItem('grwp-userpro')==='1');
  React.useEffect(()=>localStorage.setItem('grwp-userpro',userPro?'1':'0'),[userPro]);

  // Account mode — 'personal' or 'community'
  const [accountMode, setAccountMode] = React.useState(() =>
    localStorage.getItem('grwp-mode') || 'personal');
  React.useEffect(() => localStorage.setItem('grwp-mode', accountMode), [accountMode]);

  // Community Manager subscription tier (null if not subscribed)
  const [cmTier, setCmTier] = React.useState(() =>
    localStorage.getItem('grwp-cm-tier') || null);
  React.useEffect(() => {
    if (cmTier) localStorage.setItem('grwp-cm-tier', cmTier);
    else localStorage.removeItem('grwp-cm-tier');
  }, [cmTier]);

  // Personal credit balance
  const [personalCredits, setPersonalCredits] = React.useState(() =>
    parseInt(localStorage.getItem('grwp-credits') || '47'));
  React.useEffect(() =>
    localStorage.setItem('grwp-credits', String(personalCredits)),
    [personalCredits]);

  // Group credit pools — keyed by group id
  const [groupPools, setGroupPools] = React.useState(() => {
    try {
      return JSON.parse(localStorage.getItem('grwp-group-pools') || '{"FM":12,"WC":62,"UF":0}');
    } catch { return {FM:12, WC:34, UF:0}; }
  });
  React.useEffect(() =>
    localStorage.setItem('grwp-group-pools', JSON.stringify(groupPools)),
    [groupPools]);

  const switchMode = (newMode) => {
    setAccountMode(newMode);
    setScr(newMode === 'community' ? 'cmDashboard' : 'home');
  };

  const resetAll = () => {
    ['grwp-mode','grwp-cm-tier','grwp-credits','grwp-userpro','grwp-s28','grwp-group-pools'].forEach(k =>
      localStorage.removeItem(k));
    window.location.reload();
  };

  // Spends credits in correct order: group pool first, then personal.
  // Returns true if successful, false if insufficient.
  const spendCredits = (cost, groupId = null) => {
    if (groupId && groupPools[groupId] >= cost) {
      setGroupPools(prev => ({...prev, [groupId]: prev[groupId] - cost}));
      return true;
    }
    if (personalCredits >= cost) {
      setPersonalCredits(prev => prev - cost);
      return true;
    }
    // Try splitting between group + personal
    if (groupId) {
      const fromGroup = groupPools[groupId] || 0;
      const fromPersonal = cost - fromGroup;
      if (personalCredits >= fromPersonal) {
        setGroupPools(prev => ({...prev, [groupId]: 0}));
        setPersonalCredits(prev => prev - fromPersonal);
        return true;
      }
    }
    return false;
  };
  const [upgradePopup,setUpgradePopup]=React.useState(null); // {title, desc} or null
  // Credit modals + toast + chat extras
  const [topUpCtx,setTopUpCtx]=React.useState(null);   // {groupId, groupName} | null
  const [donateCtx,setDonateCtx]=React.useState(null); // {groupId, groupName} | null
  const [giftCtx,setGiftCtx]=React.useState(null);     // {recipientId, recipientName} | null
  const [toast,setToast]=React.useState(null);         // {text, color} | null
  const [chatExtras,setChatExtras]=React.useState({}); // {[groupId]: [msgs]}
  const showToast=(text,color)=>{ setToast({text,color:color||T.green}); setTimeout(()=>setToast(null),2200); };
  const appendChatMsg=(groupId,msg)=>{
    if(!groupId) return;
    setChatExtras(prev=>({...prev,[groupId]:[...(prev[groupId]||[]),{...msg,id:`x_${Date.now()}_${Math.random().toString(36).slice(2,5)}`}]}));
  };
  const FREE_GROUP_LIMIT=3;
  const userGroupCount=3; // user is currently in 3 groups
  const tryCreateGroup=()=>{
    if(!userPro&&userGroupCount>=FREE_GROUP_LIMIT){
      setUpgradePopup({title:"You've reached the group limit",desc:`Free accounts can join or create up to ${FREE_GROUP_LIMIT} groups. Upgrade to Grwp Pro for unlimited groups, AI suggestions and more.`});
    }else{
      nav('createGroup');
    }
  };

  const nav=(s)=>{ setPrev(scr); setScr(s); };
  React.useEffect(()=>localStorage.setItem('grwp-s28',scr),[scr]);
  const reset=()=>{ localStorage.setItem('grwp-s28','launch'); setScr('launch'); };
  const go=id=>{ const map={home:'home',discover:'discover',groups:'groups',chat:'messaging',memories:'memories'}; nav(map[id]||'home'); };
  const openChat=id=>{ setChatId(id); nav('chat'); };
  const openDetail=id=>{ setDetailId(id); nav('detail'); };
  const propose=(grp,v='')=>{ setMeetGroup(typeof grp==='string'?grp:(GROUP_META[grp]?.name||'My Group')); setMeetVenue(v); nav('createMeet'); };
  const invite=(grpName, grpId)=>{ setInvGroup(grpName); if(grpId) setDetailId(grpId); nav('invite'); };
  const matches=grp=>{ setMatchGroup(grp); nav('matches'); };
  const openNotif=()=>nav('notifications');
  const openProfile=()=>nav(accountMode==='community'?'cmSettings':'profile');
  const openEvent=ev=>{ setCurEvent(ev); nav('eventDetail'); };
  const openCommunityPreview=c=>{ setPreviewCommunity(c); nav('communityPreview'); };
  const openMeet=mt=>{ setCurMeet(mt); nav('meetDetail'); };
  const openMem=id=>{ setCurMemId(id); nav('memDetail'); };
  const openProPitch=()=>{nav('proPitch');};
  const openAnalytics=(groupId)=>{setAnalyticsGroupId(groupId);nav('analytics');};
  const openMemberProfile=(member,groupId)=>{ setCurMember(member); setCurMemberGroupId(groupId); nav('memberProfile'); };
  const openCommunityDetail=id=>{ setCurCommunityId(id); nav('communityDetail'); };
  const openCommunityMeet=id=>{ setCurCommunityMeetId(id); nav('communityMeet'); };
  const openCommMem=id=>{ setCurCommMemId(id); nav('commMemDetail'); };
  const openCalendar=()=>nav('calendar');
  const openGroupEdit=id=>{ setEditGroupId(id||detailId); nav('groupEdit'); };
  const goCommunity=()=>nav('groups');
  const signOut=()=>{ localStorage.setItem('grwp-s28','launch'); setScr('launch'); };
  const getNonProMemberCount = (groupId) => {
    const group = GROUP_META[groupId];
    if (!group?.members) return 0;
    return group.members.filter(m => !m.pro).length;
  };
  const isAtFreeMemberCap = (groupId) => getNonProMemberCount(groupId) >= 8;
  const [joinFullGroupId, setJoinFullGroupId] = React.useState(null);
  const tryJoinGroup = (groupId) => {
    if (!userPro && isAtFreeMemberCap(groupId)) {
      setJoinFullGroupId(groupId);
      nav('groupFull');
      return false;
    }
    return true;
  };
  // Ephemeral invite acceptance — wiped on refresh
  const [joinedGroupIds, setJoinedGroupIds] = React.useState([]);
  const [dismissedInviteIds, setDismissedInviteIds] = React.useState([]);
  const acceptInvite = (invId) => {
    const inv = PENDING_INVITES.find(i => i.id === invId);
    if (!inv) return;
    if (!tryJoinGroup(inv.groupId)) return;
    setJoinedGroupIds(j => j.includes(inv.groupId) ? j : [...j, inv.groupId]);
    setDismissedInviteIds(d => d.includes(invId) ? d : [...d, invId]);
  };
  const declineInvite = (invId) => {
    setDismissedInviteIds(d => d.includes(invId) ? d : [...d, invId]);
  };

  const [showDevMenu,setShowDevMenu]=React.useState(false);
  return (
    <div style={{width:'100%',height:'100%',overflow:'hidden',background:T.bg,position:'relative'}}>
      {scr==='launch'      &&<Launch onSignUp={()=>setScr('authchoice')} onSignIn={()=>setScr('signin')}/>}

      {scr==='smsverify'   &&<SmsVerify back={()=>setScr('signup_details')} next={()=>setScr('onboarding')}/>}
      {scr==='onboarding'  &&<Onboarding onComplete={()=>setScr('home')}/>}
      {scr==='home'        &&<HomeScreen go={go} onNotif={openNotif} onProfile={openProfile} onEvent={openEvent} onMeet={openMeet} onMem={openMem} onCommMem={openCommMem} openCommunityDetail={openCommunityDetail} onOpenCalendar={openCalendar} commRsvps={commRsvps} toggleCommRsvp={toggleCommRsvp} onPendingApprovals={()=>nav('pendingApprovals')} onProposeMeet={(grp,v)=>propose(grp,v)} onOpenCommunityPreview={openCommunityPreview} userPro={userPro} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} onSignOut={signOut} onAsk={()=>nav('exploreAsk')} dismissedInviteIds={dismissedInviteIds} acceptInvite={acceptInvite} declineInvite={declineInvite} onCommMeet={openCommunityMeet} onDevMenu={()=>setShowDevMenu(true)}/>}
      {scr==='discover'    &&<Discover go={go} onNotif={openNotif} onProfile={openProfile} onRecap={()=>setScr('recap')} onPropose={propose} openCommunityDetail={openCommunityDetail} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut} onAsk={()=>nav('exploreAsk')} personalCredits={personalCredits} onTopUp={()=>setTopUpCtx({groupId:null,groupName:null,target:'personal'})} onUpgrade={()=>setUpgradePopup({title:'Upgrade to Grwp Pro',desc:'Get a monthly credit allowance, AI insights, and personal Grwp AI any time. £1.99/month.'})}/>}
      {scr==='exploreAsk'  &&<ExploreAsk back={()=>setScr(prev||'discover')} personalCredits={personalCredits} spendCredits={spendCredits} onTopUp={(ctx)=>setTopUpCtx(ctx||{groupId:null,groupName:null,target:'personal'})}/>}
      {scr==='recap'       &&<TodaysRecap back={()=>setScr('discover')}/>}
      {scr==='groups'      &&<Groups go={go} openDetail={openDetail} onNotif={openNotif} onProfile={openProfile} goCommunity={goCommunity} nav={nav} openCommunityPreview={openCommunityPreview} openCommunityDetail={openCommunityDetail} tryCreateGroup={tryCreateGroup} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} onCMPricing={()=>nav('cmPricing')} userPro={userPro} onSignOut={signOut} onAsk={()=>nav('exploreAsk')} joinedGroupIds={joinedGroupIds} dismissedInviteIds={dismissedInviteIds} acceptInvite={acceptInvite} declineInvite={declineInvite}/>}
      {scr==='communityDetail'&&<CommunityDetail id={curCommunityId} back={()=>{const skip=['communityDetail','communityMeet'];setScr(skip.includes(prev)?'groups':(prev||'groups'));}} onCommMeet={openCommunityMeet}/>}
      {scr==='communityMeet'&&<CommunityMeetDetail meetId={curCommunityMeetId} back={()=>setScr(prev||'home')} openCommunityDetail={openCommunityDetail}/>}
      {scr==='detail'      &&<GroupDetail id={detailId} back={()=>{const skip=['detail','invite','matches','memberProfile','groupEdit','analytics','monthlyReport','createMeet','chat'];setScr(skip.includes(prev)?'groups':(prev||'groups'));}} openChat={openChat} onPropose={propose} onInvite={invite} onMatches={matches} onEdit={openGroupEdit} onMemberTap={openMemberProfile} onAnalytics={openAnalytics} onUpgrade={openProPitch} onDonate={(gid,gname)=>setDonateCtx({groupId:gid,groupName:gname})} onMonthlyReport={(gid)=>{setDetailId(gid);nav('monthlyReport');}} groupPools={groupPools}/>}
      {scr==='monthlyReport'&&<MonthlyReport id={detailId} back={()=>setScr('detail')}/>}
      {scr==='groupEdit'  &&<GroupEdit id={editGroupId} back={()=>setScr('detail')}/>}
      {scr==='createGroup'&&<CreateGroup back={()=>setScr('groups')}/>}
      {scr==='createCommunity'&&<CreateCommunity back={()=>setScr('groups')} userPro={userPro} cmTier={cmTier} onCMPricing={()=>nav('cmPricing')} onUpgradePro={()=>setUpgradePopup({title:'Upgrade to Grwp Pro',desc:'Run communities with up to 50 members, plus AI suggestions and analytics. £1.99/month.'})}/>}
      {scr==='proPitch'&&<GrwpProPitch back={()=>setScr(prev||'detail')}/>}
      {scr==='analytics'&&<GroupAnalytics id={analyticsGroupId} back={()=>setScr('detail')}/>}
      {scr==='memberProfile'&&<MemberProfile member={curMember} groupId={curMemberGroupId} back={()=>setScr('detail')} onChat={openChat} onPropose={propose} onGift={(mem)=>setGiftCtx({recipientId:mem?.i||mem?.name,recipientName:mem?.name})}/>}
      {scr==='matches'     &&<MatchesArchive back={()=>setScr('detail')} groupName={matchGroup} onPropose={v=>propose(matchGroup,v)}/>}
      {scr==='createMeet'  &&<CreateMeet back={()=>setScr(prev||'detail')} groupName={meetGroup} prefill={meetVenue}/>}
      {scr==='invite'      &&<InviteScreen back={()=>setScr('detail')} groupName={invGroup} groupId={detailId} isAtFreeMemberCap={isAtFreeMemberCap} onInviteSent={(names)=>{
        if(!detailId||!names||!names.length) return;
        const list = names.length===1 ? names[0].split(' ')[0]
          : names.length===2 ? `${names[0].split(' ')[0]} and ${names[1].split(' ')[0]}`
          : `${names.slice(0,-1).map(n=>n.split(' ')[0]).join(', ')} and ${names[names.length-1].split(' ')[0]}`;
        appendChatMsg(detailId,{type:'invite_sent',from:'system',mine:false,time:'Now',text:`You invited ${list} to the group`});
      }}/>}
      {scr==='groupFull'   &&<GroupFullScreen groupName={GROUP_META[joinFullGroupId]?.name} back={()=>setScr(prev||'groups')} onUpgrade={()=>{setUpgradePopup({title:'Upgrade to Grwp Pro',desc:'Get AI suggestions, unlimited matches, and join groups even when they\'re at the free cap. £1.99/month.'});setScr(prev||'groups');}}/>}
      {scr==='messaging'   &&<Messaging go={go} openChat={openChat} openCommunityDetail={openCommunityDetail} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut}/>}
      {scr==='chat'        &&<Chat id={chatId} back={()=>setScr('messaging')} onPropose={(v)=>{if(v==='__proPitch__'){openProPitch();}else{propose(GROUP_META[chatId]?.name||'My Group',v||'');}}} onInvite={()=>invite(GROUP_META[chatId]?.name||'My Group', chatId)} groupPools={groupPools} personalCredits={personalCredits} onTopUp={(ctx)=>setTopUpCtx(ctx||{groupId:chatId,groupName:GROUP_META[chatId]?.name})} chatExtras={chatExtras} spendCredits={spendCredits} userPro={userPro} onUpgrade={()=>setUpgradePopup({title:'Upgrade to Grwp Pro',desc:'Interact with AI suggestions in any group, even when others paid for them. £1.99/month.'})} isAtFreeMemberCap={isAtFreeMemberCap}/>}
      {scr==='memories'    &&<Memories go={go} onMem={openMem} onCommMem={openCommMem} onNotif={openNotif||function(){}} onProfile={openProfile||function(){}} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut} onAsk={()=>nav('exploreAsk')}/>}
      {scr==='notifications'&&<NotificationsScreen back={()=>setScr(prev||'home')} cmTier={cmTier} dismissedInviteIds={dismissedInviteIds} acceptInvite={acceptInvite} declineInvite={declineInvite}/>}
      {scr==='pendingApprovals'&&<PendingApprovals back={()=>setScr(prev||'home')} dismissedInviteIds={dismissedInviteIds} acceptInvite={acceptInvite} declineInvite={declineInvite}/>}
      {scr==='cmPricing'&&<CMPricingScreen
        back={()=>setScr(prev||'profile')}
        onSubscribe={(tier)=>{setCmTier(tier);setScr('cmDashboard');}}
        accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut}/>}
      {scr === 'cmDashboard' && <CMDashboard
        back={() => setScr('home')}
        onPostMeet={() => setScr('cmCreateMeet')}
        onPostAnnouncement={() => setScr('cmAnnouncement')}
        onAITools={() => setScr('cmAITools')}
        onMembers={() => setScr('cmMembers')}
        onProfile={openProfile}
        onNotif={openNotif}
        accountMode={accountMode}
        cmTier={cmTier}
        onSwitchMode={switchMode}
        onNav={(id)=>setScr(id)}
        userPro={userPro}
        onSignOut={signOut}
      />}
      {scr==='cmAITools' &&<CMAIToolsHub back={()=>setScr('cmDashboard')} onTool={(t)=>setScr(t.route)} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} onNav={(id)=>setScr(id)} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmToolEventSuggest' &&<CMEventSuggestions back={()=>setScr('cmAITools')} onPostMeet={(s)=>setScr('cmCreateMeet')} onEdit={(s)=>setScr('cmCreateMeet')} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} onNav={(id)=>setScr(id)} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmToolAnnouncement' &&<CMAnnouncementWriter back={()=>setScr('cmAITools')} onPost={()=>setScr('cmPosts')} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} onNav={(id)=>setScr(id)} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmToolMeetDesc' &&<CMMeetDescription back={()=>setScr('cmAITools')} onPost={()=>setScr('cmMeets')} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} onNav={(id)=>setScr(id)} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmToolRecap' &&<CMWeeklyRecap back={()=>setScr('cmAITools')} onEditSettings={()=>{}} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} onNav={(id)=>setScr(id)} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmMeets'   &&<CMMeets   go={(id)=>setScr(id)} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmMembers' &&<CMMembers go={(id)=>setScr(id)} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmPosts'   &&<CMPosts   go={(id)=>setScr(id)} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut}/>}
      {scr==='cmInsights'&&<CMInsights go={(id)=>setScr(id)} onNotif={openNotif} onProfile={openProfile} accountMode={accountMode} cmTier={cmTier} onSwitchMode={switchMode} userPro={userPro} onSignOut={signOut}/>}
      {scr==='profile'     &&<PersonalSettings back={()=>setScr(prev||'home')} logout={signOut} onGroup={openDetail} userPro={userPro} setUserPro={setUserPro} onCMPricing={()=>nav('cmPricing')} cmTier={cmTier} setCmTier={setCmTier} personalCredits={personalCredits} onTopUp={()=>setTopUpCtx({groupId:null,groupName:null})} onDonate={()=>setDonateCtx({groupId:'FM',groupName:GROUP_META.FM?.name})} onResetAll={resetAll}/>}
      {scr==='cmSettings'  &&<CMSettings back={()=>setScr(prev||'cmDashboard')} cmTier={cmTier} setCmTier={setCmTier} onPricing={()=>nav('cmPricing')}/>}
      {scr==='eventDetail' &&<EventDetail event={curEvent} back={()=>setScr(prev||'home')}/>}
      {scr==='communityPreview'&&<CommunityPreview community={previewCommunity} back={()=>setScr(prev||'groups')} welcome={previewCommunity&&previewCommunity._welcome} expect1={previewCommunity&&previewCommunity._e1} expect2={previewCommunity&&previewCommunity._e2} expect3={previewCommunity&&previewCommunity._e3}/>}
      {scr==='meetDetail'  &&<MeetDetail meet={curMeet} back={()=>setScr(prev||'home')}/>}
      {scr==='memDetail'   &&<MemoryDetail memId={curMemId} back={()=>setScr(prev||'memories')}/> }
      {scr==='commMemDetail'&&<CommunityMemoryDetail memId={curCommMemId} back={()=>setScr(prev||'memories')} openCommunityDetail={openCommunityDetail}/>}
      {scr==='calendar'     &&<CalendarView back={()=>setScr('home')} openCommunityDetail={openCommunityDetail} onMem={openMem} onMeet={openMeet} onCommMeet={openCommunityMeet}/>}
      {scr!=='launch'&&scr!=='signin'&&<div onClick={reset} style={{position:'absolute',top:6,left:'50%',transform:'translateX(-50%)',width:90,height:36,zIndex:30,cursor:'pointer',borderRadius:20}} title="Reset"/>}
      {/* Upgrade-to-Pro popup */}
      {upgradePopup&&(
        <div onClick={()=>setUpgradePopup(null)} style={{position:'absolute',inset:0,background:'rgba(10,14,30,0.72)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center',padding:'0 14px 90px'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'linear-gradient(160deg,#1A1A2E 0%,#2D1B69 60%,#4C1D95 100%)',borderRadius:28,overflow:'hidden',width:'100%',boxShadow:'0 24px 80px rgba(0,0,0,0.55)',animation:'slideUp .32s cubic-bezier(.34,1.3,.64,1)',position:'relative'}}>
            {/* decorative blur circles */}
            <div style={{position:'absolute',top:-30,right:-30,width:120,height:120,borderRadius:60,background:'rgba(124,58,237,0.30)',pointerEvents:'none'}}/>
            <div style={{position:'absolute',bottom:-24,left:-24,width:80,height:80,borderRadius:40,background:'rgba(72,112,221,0.22)',pointerEvents:'none'}}/>
            <div style={{padding:'24px 22px 22px',position:'relative'}}>
              {/* Pro icon */}
              <div style={{width:54,height:54,borderRadius:16,background:'linear-gradient(135deg,#7C3AED,#4870DD)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14,boxShadow:'0 6px 20px rgba(124,58,237,0.45)'}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="white"/></svg>
              </div>
              <div style={{fontSize:9,fontWeight:800,color:'rgba(196,181,253,0.65)',letterSpacing:'.12em',marginBottom:6}}>GRWP PRO</div>
              <div style={{fontSize:20,fontWeight:900,color:'white',letterSpacing:'-0.4px',lineHeight:1.2,marginBottom:8}}>{upgradePopup.title}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.65)',lineHeight:1.55,marginBottom:18}}>{upgradePopup.desc}</div>
              {/* Pro perks */}
              <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20,padding:'12px 14px',background:'rgba(255,255,255,0.06)',borderRadius:12,border:'1px solid rgba(255,255,255,0.08)'}}>
                {[
                  'Unlimited groups',
                  'AI venue suggestions in your feed',
                  'Group analytics & insights',
                  'Up to 30 members per group',
                ].map((f,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4L19 6" stroke="#34D399" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.85)'}}>{f}</span>
                  </div>
                ))}
              </div>
              <button onClick={()=>{setUpgradePopup(null);setUserPro(true);}} style={{width:'100%',background:'white',color:'#5B21B6',border:'none',borderRadius:50,padding:'13px',fontSize:13,fontWeight:800,cursor:'pointer',marginBottom:8,fontFamily:'inherit',boxShadow:'0 4px 16px rgba(0,0,0,0.30)'}}>
                Upgrade to Pro · £1.99/mo
              </button>
              <button onClick={()=>setUpgradePopup(null)} style={{width:'100%',background:'transparent',color:'rgba(255,255,255,0.55)',border:'1px solid rgba(255,255,255,0.18)',borderRadius:50,padding:'12px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                Maybe later
              </button>
            </div>
          </div>
        </div>
      )}
      {/* Top-up modal */}
      <TopUpModal
        open={!!topUpCtx}
        onClose={()=>setTopUpCtx(null)}
        groupId={topUpCtx?.groupId}
        groupName={topUpCtx?.groupName}
        onConfirm={({target,groupId})=>{
          if(target==='group'&&groupId){
            setGroupPools(prev=>({...prev,[groupId]:(prev[groupId]||0)+25}));
            appendChatMsg(groupId,{type:'system',creditEvent:true,text:`💰 You added 25 credits to the group`,time:'Now'});
          } else {
            setPersonalCredits(prev=>prev+25);
          }
          setTopUpCtx(null);
          showToast('+25 credits added',T.green);
        }}
      />
      {/* Donate modal */}
      <DonateModal
        open={!!donateCtx}
        onClose={()=>setDonateCtx(null)}
        groupId={donateCtx?.groupId}
        groupName={donateCtx?.groupName}
        personalCredits={personalCredits}
        onConfirm={({amount,groupId})=>{
          setPersonalCredits(prev=>prev-amount);
          if(groupId) setGroupPools(prev=>({...prev,[groupId]:(prev[groupId]||0)+amount}));
          if(groupId) appendChatMsg(groupId,{type:'system',creditEvent:true,text:`💰 You donated ${amount} credits to ${donateCtx.groupName||'the group'}`,time:'Now'});
          setDonateCtx(null);
          showToast(`Donated ${amount} ${amount===1?'credit':'credits'}`,T.green);
        }}
      />
      {/* Gift modal */}
      <GiftModal
        open={!!giftCtx}
        onClose={()=>setGiftCtx(null)}
        recipientId={giftCtx?.recipientId}
        recipientName={giftCtx?.recipientName}
        personalCredits={personalCredits}
        onConfirm={({amount,message,recipientId})=>{
          setPersonalCredits(prev=>prev-amount);
          setGiftCtx(null);
          showToast(`Sent ${amount} ${amount===1?'credit':'credits'} to ${giftCtx.recipientName||'friend'}`,T.purple);
        }}
      />
      {/* Toast */}
      {toast&&(
        <div style={{position:'absolute',top:74,left:'50%',transform:'translateX(-50%)',zIndex:300,
          background:toast.color,color:'white',borderRadius:50,padding:'10px 18px',
          fontSize:12,fontWeight:700,boxShadow:'0 6px 20px rgba(15,23,42,0.30)',
          animation:'slideUp .25s ease-out',whiteSpace:'nowrap',pointerEvents:'none'}}>
          {toast.text}
        </div>
      )}
      {/* Hidden dev menu — opened by tapping "Grwp" on the home tab */}
      {showDevMenu && (
        <DemoToggles
          onClose={()=>setShowDevMenu(false)}
          onBackToStart={()=>{ setShowDevMenu(false); reset(); }}
        />
      )}
    </div>
  );
}

/* ── Hidden Dev Menu — opened by tapping "Grwp" on the home tab ── */
const DemoToggles = ({onClose, onBackToStart}) => {
  const [pro, setPro] = React.useState(()=>localStorage.getItem('grwp-userpro')==='1');
  const [cm, setCm]   = React.useState(()=>localStorage.getItem('grwp-cm-tier')||'');
  const apply = (key, val) => {
    if(val===null||val===''||val===false) localStorage.removeItem(key);
    else localStorage.setItem(key, val===true?'1':val);
    location.reload();
  };
  const tiers = [
    {v:'',          label:'Off'},
    {v:'small',     label:'Small'},
    {v:'medium',    label:'Medium'},
    {v:'large',     label:'Large'},
    {v:'unlimited', label:'Unlimited'},
  ];
  return (
    <div onClick={onClose} style={{
      position:'absolute',inset:0,zIndex:9999,
      background:'rgba(8,12,24,0.55)',
      display:'flex',alignItems:'flex-start',justifyContent:'center',
      padding:'calc(env(safe-area-inset-top) + 24px) 16px 24px',
      animation:'modeDrop .18s ease-out',
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'100%',maxWidth:340,
        background:'rgba(15,23,42,0.96)',color:'white',
        borderRadius:18,padding:'14px 14px 12px',
        fontSize:12,fontFamily:'-apple-system,system-ui,sans-serif',
        boxShadow:'0 12px 36px rgba(0,0,0,0.45)',
        display:'flex',flexDirection:'column',gap:10,
        border:'1px solid rgba(255,255,255,0.08)',
      }}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:'.14em',color:'rgba(255,255,255,0.6)'}}>DEMO USER · DEV MENU</div>
          <button onClick={onClose} style={{
            width:26,height:26,borderRadius:13,border:'none',cursor:'pointer',
            background:'rgba(255,255,255,0.08)',color:'white',fontSize:14,fontWeight:700,
            display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>×</button>
        </div>
        {/* Personal tier */}
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.7)',width:60,flexShrink:0}}>Personal</span>
          <button onClick={()=>{setPro(false);apply('grwp-userpro',false);}}
            style={{flex:1,padding:'7px 8px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,
              background:!pro?'white':'rgba(255,255,255,0.12)',color:!pro?'#0F172A':'white',fontFamily:'inherit'}}>
            Free
          </button>
          <button onClick={()=>{setPro(true);apply('grwp-userpro',true);}}
            style={{flex:1,padding:'7px 8px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,
              background:pro?'#7C3AED':'rgba(255,255,255,0.12)',color:'white',fontFamily:'inherit'}}>
            Pro
          </button>
        </div>
        {/* CM tier */}
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.7)',width:60,flexShrink:0}}>CM tier</span>
          <select value={cm} onChange={e=>{setCm(e.target.value);apply('grwp-cm-tier',e.target.value);}}
            style={{flex:1,padding:'7px 8px',borderRadius:8,border:'none',
              background:cm?'#0D9488':'rgba(255,255,255,0.12)',color:'white',fontSize:11,fontWeight:700,fontFamily:'inherit',cursor:'pointer',outline:'none'}}>
            {tiers.map(t=><option key={t.v} value={t.v} style={{color:'#0F172A'}}>{t.label}</option>)}
          </select>
        </div>
        {/* Back to start screen */}
        <button onClick={onBackToStart}
          style={{padding:'9px 10px',borderRadius:8,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,
            background:'rgba(72,112,221,0.22)',color:'#A5C0FF',fontFamily:'inherit'}}>
          ← Back to start screen
        </button>
        {/* Clear credits */}
        <button onClick={()=>{
            localStorage.setItem('grwp-credits','0');
            localStorage.setItem('grwp-group-pools',JSON.stringify({FM:0,WC:0,UF:0}));
            location.reload();
          }}
          style={{padding:'8px 10px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,
            background:'rgba(245,158,11,0.20)',color:'#FCD34D',fontFamily:'inherit'}}>
          Clear all credits
        </button>
        {/* Reset */}
        <button onClick={()=>{
            ['grwp-mode','grwp-cm-tier','grwp-credits','grwp-userpro','grwp-s28','grwp-group-pools'].forEach(k=>localStorage.removeItem(k));
            location.reload();
          }}
          style={{padding:'8px 10px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,
            background:'rgba(239,68,68,0.20)',color:'#FCA5A5',fontFamily:'inherit'}}>
          Reset all demo data
        </button>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="wrap">
    <App/>
  </div>
);
</script>
</body>
</html>
